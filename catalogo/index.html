<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Catálogo de Instrumentos — IME Calibraciones | Metrología Industrial</title>
  <meta name="description" content="Catálogo de instrumentos de medición y calibración. Filtrar por magnitud, marca o categoría. Más de 150 productos para industria manufacturera, farmacéutica y automotriz.">
  <link rel="canonical" href="https://imecalibraciones.com/catalogo/">
  <meta property="og:title" content="Catálogo de Instrumentos — IME Calibraciones | Metrología Industrial">
  <meta property="og:description" content="Catálogo de instrumentos de medición y calibración. Filtrar por magnitud, marca o categoría. Más de 150 productos para industria manufacturera, farmacéutica y automotriz.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://imecalibraciones.com/catalogo/">
  <meta property="og:image" content="https://imecalibraciones.com/assets/images/og-default.jpg">
  <meta property="og:locale" content="es_MX">
  <link rel="icon" type="image/svg+xml" href="/assets/images/logo/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/images/logo/favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/images/logo/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <link rel="stylesheet" href="/assets/css/catalog.css">

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "ItemList",
    "name": "Catálogo de Instrumentos de Medición — IME Calibraciones",
    "description": "Catálogo de instrumentos de medición y calibración para industria manufacturera, farmacéutica y automotriz.",
    "url": "https://imecalibraciones.com/catalogo/",
    "numberOfItems": 0,
    "itemListElement": []
  }
  </script>
</head>
<body>
  <div id="site-header"></div>
  <main>

    <!-- ===== CABECERA DEL CATÁLOGO ===== -->
    <div class="catalog-header">
      <div class="container">
        <nav class="breadcrumb" aria-label="Ruta de navegación">
          <ol>
            <li><a href="/">Inicio</a></li>
            <li aria-current="page">Catálogo</li>
          </ol>
        </nav>
        <h1>Catálogo de Instrumentos de Medición</h1>
      </div>
    </div>

    <!-- ===== LAYOUT PRINCIPAL: FILTROS + RESULTADOS ===== -->
    <div class="catalog-layout container">

      <!-- ========== ASIDE: FILTROS ========== -->
      <aside class="catalog-filters" aria-label="Filtros del catálogo">

        <div class="filters-header">
          <h3 class="filters-header__title">Filtros</h3>
          <button
            type="button"
            id="filters-clear"
            class="filters-clear-btn"
            aria-label="Limpiar todos los filtros">
            Limpiar todo
          </button>
        </div>

        <!-- Barra de búsqueda -->
        <div class="catalog-search-bar">
          <label for="catalog-search" class="visually-hidden">Buscar instrumentos</label>
          <input
            type="search"
            id="catalog-search"
            class="catalog-search-input"
            placeholder="Buscar por nombre, marca o modelo..."
            autocomplete="off"
            aria-label="Buscar por nombre, marca o modelo">
        </div>

        <!-- Filtro: Magnitud -->
        <div id="filter-magnitud" class="filter-group" aria-labelledby="filter-magnitud-title">
          <h4 class="filter-group-title" id="filter-magnitud-title">Magnitud</h4>
          <!-- Opciones generadas por catalog.js a partir de los datos de productos -->
          <div class="filter-group__options" data-filter="magnitud">
            <!-- JS: populated dynamically -->
          </div>
        </div>

        <!-- Filtro: Marca -->
        <div id="filter-marca" class="filter-group" aria-labelledby="filter-marca-title">
          <h4 class="filter-group-title" id="filter-marca-title">Marca</h4>
          <div class="filter-group__options" data-filter="marca">
            <!-- JS: populated dynamically -->
          </div>
        </div>

        <!-- Filtro: Categoría -->
        <div id="filter-categoria" class="filter-group" aria-labelledby="filter-categoria-title">
          <h4 class="filter-group-title" id="filter-categoria-title">Categoría</h4>
          <div class="filter-group__options" data-filter="categoria">
            <!-- JS: populated dynamically -->
          </div>
        </div>

      </aside>

      <!-- ========== MAIN: RESULTADOS ========== -->
      <section class="catalog-results" aria-label="Resultados del catálogo">

        <!-- Cabecera de resultados -->
        <div class="catalog-results-header">
          <span id="results-count" class="results-count" aria-live="polite" aria-atomic="true">
            <!-- JS: p.ej. "148 instrumentos" -->
          </span>
          <div id="active-filters" class="active-filters" aria-label="Filtros activos">
            <!-- JS: chips de filtros activos con botón de eliminar -->
          </div>
        </div>

        <!-- Grid de productos -->
        <div
          id="products-grid"
          class="products-grid"
          aria-live="polite"
          aria-atomic="false"
          aria-relevant="additions removals">
          <!-- JS: tarjetas de producto generadas por catalog.js -->
          <!-- Cada tarjeta tendrá la estructura:
            <article class="product-card">
              <a href="/catalogo/[slug]/">
                <div class="product-card__image">...</div>
                <div class="product-card__body">
                  <span class="product-card__magnitud">Magnitud</span>
                  <h2 class="product-card__name">Nombre del instrumento</h2>
                  <p class="product-card__marca">Marca</p>
                </div>
                <div class="product-card__footer">
                  <span class="btn btn--sm btn--outline">Ver detalles</span>
                </div>
              </a>
            </article>
          -->
        </div>

        <!-- Estado: sin resultados -->
        <div id="no-results" class="no-results" hidden>
          <p>No se encontraron instrumentos con los filtros seleccionados.</p>
          <button type="button" id="no-results-clear" class="btn btn--outline">
            Limpiar filtros
          </button>
        </div>

        <!-- Estado: cargando -->
        <div id="catalog-loading" class="catalog-loading" aria-live="polite" hidden>
          <span class="visually-hidden">Cargando instrumentos…</span>
          <div class="loading-spinner" aria-hidden="true"></div>
        </div>

      </section>

    </div>

  </main>
  <div id="site-footer"></div>
  <div id="whatsapp-widget" class="no-print"></div>
  <script src="/assets/js/utils.js" defer></script>
  <script src="/assets/js/catalog.js" defer></script>
</body>
</html>
